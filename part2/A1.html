<html>

<head>
  <meta charset="UTF-8">
  <title>CPSC 314 Assignment 1 2025W-T2</title>
  <style>
    body {
      /* Remove the default padding and margin around the canvas */
      padding: 0;
      margin: 0;
      /* Disable scrolling */
      overflow: hidden;
      font-family: Arial, sans-serif;
    }
    
    /* UI Overlay */
    #gameUI {
      position: absolute;
      top: 20px;
      left: 20px;
      color: white;
      text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.8);
      z-index: 100;
    }
    
    #score {
      font-size: 24px;
      font-weight: bold;
      margin-bottom: 10px;
    }
    
    #timer {
      font-size: 18px;
      margin-bottom: 10px;
    }
    
    #progress {
      font-size: 16px;
    }
    
    #victoryMessage {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      color: #FFD700;
      font-size: 48px;
      font-weight: bold;
      text-shadow: 3px 3px 6px rgba(0, 0, 0, 0.9);
      z-index: 200;
      display: none;
    }
    
    #gameOverMessage {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      color: #FF4444;
      font-size: 48px;
      font-weight: bold;
      text-shadow: 3px 3px 6px rgba(0, 0, 0, 0.9);
      z-index: 200;
      display: none;
    }
    
    #startButton {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      padding: 20px 40px;
      font-size: 32px;
      font-weight: bold;
      background-color: #4CAF50;
      color: white;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      z-index: 200;
      box-shadow: 0 4px 8px rgba(0, 0, 0, 0.3);
      transition: background-color 0.3s;
    }
    
    #startButton:hover {
      background-color: #45a049;
    }
    
    #startButton:active {
      background-color: #3d8b40;
    }
    
    #startButton.hidden {
      display: none;
    }
  </style>
</head>

<body>
  <canvas id="webglcanvas"></canvas>
  
  <!-- Game UI -->
  <div id="gameUI">
    <div id="score">Score: <span id="scoreValue">0</span></div>
    <div id="timer">Time: <span id="timerValue">0.0</span>s</div>
    <div id="progress">Orbs Collected: <span id="collectedCount">0</span> / <span id="totalCount">0</span></div>
  </div>
  
  <!-- Start Button -->
  <button id="startButton">Start Game</button>
  
  <!-- Victory Message -->
  <div id="victoryMessage">Victory!</div>
  
  <!-- Game Over Message -->
  <div id="gameOverMessage">Game Over!</div>
  <script src="js/WebGL.js"></script>
  <script src="js/three.min.js"></script>
  <script src="js/OBJLoader.js"></script>
  <script src="js/SourceLoader.js"></script>
  <script src="js/OrbitControls.js"></script>
  <script src="js/KeyboardState.js"></script> <!-- By Jerome Etienne: http://jetienne.com/ -->
  <script src="js/setup.js"></script>
  <!-- Main application (ES6 module) -->
  <script type="module" src="A1.js"></script>
</body>

</html>
